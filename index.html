<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freya's Nexus Hub</title>
    <style>
        /* Base Setup & Fluid Layout Mechanics */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            scroll-behavior: smooth;
        }

        :root {
            --bg-base: #040817;
            --pink-neon: #ff2a85;
            --gold-bright: #f3b043;
            --blue-electric: #00f0ff;
            --text-pure: #ffffff;
            --text-dim: #64748b;
            --glass-panel: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
            --transition-fluid: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-pure);
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Fluid Glow Background Orbs */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.18;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 { top: -20%; left: -10%; width: 600px; height: 600px; background: var(--pink-neon); }
        .orb-2 { bottom: -20%; right: -10%; width: 700px; height: 700px; background: var(--gold-bright); }

        /* Premium Curved Pill Top Navigation Bar */
        .top-navbar {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 17, 40, 0.4);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 8px 12px;
            border-radius: 100px; /* Forces the capsule/circle edge design */
            display: flex;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .nav-tab {
            color: var(--text-pure);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 100px; /* Matching pill tabs */
            transition: var(--transition-fluid);
            letter-spacing: 0.3px;
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--blue-electric);
        }

        /* Active tab state showcasing pink-to-gold premium gradient */
        .nav-tab.active {
            background: linear-gradient(135deg, var(--pink-neon), var(--gold-bright));
            color: var(--bg-base);
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 42, 133, 0.3);
        }

        /* Structural Content Layout segments */
        section {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 2rem 60px 2rem;
            position: relative;
            z-index: 1;
        }

        /* --- SECTION 1: HOMEPAGE INTRO --- */
        .hero-center {
            text-align: center;
            max-width: 800px;
        }

        .hero-center h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .gradient-brand {
            background: linear-gradient(135deg, var(--pink-neon) 0%, #d946ef 50%, var(--gold-bright) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-center p {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }

        /* Central Redirect Portal Button */
        .directory-launcher {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--glass-panel);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 36px;
            border-radius: 100px;
            color: var(--text-pure);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
            transition: var(--transition-fluid);
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }

        .directory-launcher:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--pink-neon);
            box-shadow: 0 15px 30px rgba(255, 42, 133, 0.15), 0 0 20px rgba(243, 176, 67, 0.1);
        }

        .directory-launcher span {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .directory-launcher:hover span {
            transform: translateY(4px);
        }

        /* --- SECTION 2: THE INFINITE DIRECTORY --- */
        #directory {
            background: rgba(3, 5, 13, 0.6);
            backdrop-filter: blur(40px);
            border-top: 1px solid var(--glass-border);
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 3rem;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* Horizontal/Vertical Smooth Scroll Panel container */
        .subject-scroller {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            padding: 10px;
        }

        /* High-Tier Directory Subject Layout Block */
        .subject-panel {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            position: relative;
            transition: var(--transition-fluid);
        }

        .subject-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-6px);
        }

        .subject-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .badge-chat { background: rgba(0, 240, 255, 0.1); color: var(--blue-electric); }
        .badge-apps { background: rgba(255, 42, 133, 0.1); color: var(--pink-neon); }
        .badge-vault { background: rgba(243, 176, 67, 0.1); color: var(--gold-bright); }

        .subject-panel h3 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .subject-panel p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        /* Preview elements simulating real actions */
        .mock-chat-box {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .chat-line { margin-bottom: 6px; color: #cbd5e1; }
        .chat-line span { color: var(--blue-electric); font-weight: 600; }

        /* Status indicators for upcoming products */
        .app-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gold-bright);
        }
        
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--gold-bright);
            border-radius: 50%;
            animation: blink 1.5s infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .top-navbar { width: 90%; justify-content: center; }
            .nav-tab { padding: 8px 16px; font-size: 0.85rem; }
            .hero-center h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <!-- Ambient Visual Environment Background layers -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <!-- Capsule Nav Bar at Top -->
    <nav class="top-navbar">
        <a href="#home" class="nav-tab active">Home</a>
        <a href="#directory" class="nav-tab">Directory</a>
        <a href="#about" class="nav-tab">About Hub</a>
    </nav>

    <!-- SECTION 1: HOMEPAGE START -->
    <section id="home">
        <div class="hero-center">
            <h1>Welcome to <span class="gradient-brand">Freya's</span> Nexus</h1>
            <p>An experimental, high-performance web platform designed to host custom utilities, active asset libraries, and open channel communications.</p>
            
            <!-- Central Redirect Module -->
            <a href="#directory" class="directory-launcher">
                Explore Hub Directory <span>↓</span>
            </a>
        </div>
    </section>

    <!-- SECTION 2: THE SUBJECTS & APP DIRECTORY -->
    <section id="directory">
        <h2 class="section-title">Central Hub Directory</h2>
        
        <div class="subject-scroller">
            
            <!-- Subject Column 1: Chat Network -->
            <div class="subject-panel">
                <div class="subject-badge badge-chat">Network Channel</div>
                <h3>Community Chats</h3>
