<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID // Expanded Directory</title>
    <style>
        /* Shared CSS Variables */
        :root {
            --bg-void: #050508;
            --bg-surface: #0f0c1b;
            --border-dim: #221936;
            --accent-neo: #bc13fe;
            --text-main: #f1edfa;
            --text-muted: #6d5f8a;
            --font-mono: 'Courier New', Courier, monospace;
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body { background-color: var(--bg-void); color: var(--text-main); font-family: var(--font-sans); margin: 0; padding: 20px; display: none; }
        
        header { border-bottom: 1px solid var(--border-dim); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { font-family: var(--font-mono); margin: 0; color: var(--accent-neo); }
        .back-link { color: var(--text-muted); text-decoration: none; font-family: var(--font-mono); font-size: 0.9rem; }
        .back-link:hover { color: var(--text-main); }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .data-card { background: var(--bg-surface); border: 1px solid var(--border-dim); padding: 20px; border-radius: 4px; transition: border-color 0.3s; }
        .data-card:hover { border-color: var(--accent-neo); box-shadow: 0 0 15px rgba(161, 36, 255, 0.1); }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid var(--border-dim); padding-bottom: 10px; }
        .card-id { color: var(--accent-neo); font-family: var(--font-mono); }
        
        #security-overlay { position: fixed; inset: 0; background: var(--bg-void); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
        #security-overlay h2 { font-family: var(--font-mono); color: #ff0055; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="security-overlay">
        <h2>UNAUTHORIZED ACCESS DETECTED</h2>
        <p>Session token missing. Redirecting to gateway...</p>
    </div>

    <header>
        <div>
            <h1>MATRIX DIRECTORY</h1>
            <div id="auth-display" style="font-family: monospace; color: var(--text-muted); font-size: 0.8rem; margin-top: 5px;"></div>
        </div>
        <a href="index.html" class="back-link">← Return to Core Console</a>
    </header>

    <div class="grid-container" id="full-directory">
        </div>

    <script>
        // Cross-File Security Handshake
        window.onload = () => {
            const token = localStorage.getItem('void_session') || sessionStorage.getItem('void_session');
            const overlay = document.getElementById('security-overlay');
            
            if (!token) {
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            // Authentic Session Discovered
            const sessionData = JSON.parse(token);
            document.body.style.display = 'block';
            overlay.style.display = 'none';
            document.getElementById('auth-display').innerText = `ACCESS GRANTED // OPR: ${sessionData.user}`;

            // Populate the 100-cell grid layout
            const categories = ["Analytical Tensors", "Quantum Mechanics", "Data Topologies", "Neural Configurations", "Cryptographic Strings", "Heuristic Optimization"];
            const container = document.getElementById('full-directory');
            let html = '';
            let index = 1;

            categories.forEach(cat => {
                const count = (cat === "Heuristic Optimization") ? 15 : 17;
                for(let i = 0; i < count; i++) {
                    const idStr = index.toString().padStart(3, '0');
                    html += `
                        <div class="data-card">
                            <div class="card-header">
                                <span style="font-weight: bold; font-size: 0.9rem;">${cat}</span>
                                <span class="card-id">M_${idStr}</span>
                            </div>
                            <div style="color: var(--text-muted); font-size: 0.8rem; line-height: 1.5;">
                                Sector active. Telemetry data streaming normally. Hash validation successful for block parameter ${Math.random().toString(36).substring(7)}.
                            </div>
                        </div>`;
                    index++;
                }
            });
            container.innerHTML = html;
        };
    </script>
</body>
</html>
